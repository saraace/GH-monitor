# import PRReview from "./PRReviewFragment.graphql"

fragment PR on PullRequest {
  id
  title
  state
  isDraft
  url
  createdAt
  lastEditedAt
  reviewDecision
  number
  lastEditedAt
  latestReviews(first: 20) {
    nodes {
      ...PRReview
    }
  }
  statusCheckRollup {
    id
    state
  }
  author {
    ... on User {
      id
      avatarUrl(size: 64)
      login
    }
  }
}
